services:
  mysql:
    image: mysql:8.4
    container_name: ruoyi-mysql
    profiles:
      - local-infra
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ry-vue
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - ruoyi-mysql-data:/var/lib/mysql
      - ./RuoYi-Vue/sql/ry_20260417.sql:/docker-entrypoint-initdb.d/01-ry.sql:ro
      - ./RuoYi-Vue/sql/quartz.sql:/docker-entrypoint-initdb.d/02-quartz.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ruoyi-redis
    profiles:
      - local-infra
    restart: "no"
    ports:
      - "6379:6379"
    volumes:
      - ruoyi-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ruoyi-mysql-data:
  ruoyi-redis-data:
